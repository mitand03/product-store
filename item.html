<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product – Product Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            color: #1f2937;
        }

        /* ── HEADER ── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 200;
            gap: 12px;
        }

        .back-btn {
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .back-btn:hover { background: rgba(255,255,255,0.35); transform: translateY(-1px); }

        /* ── PRODUCT DETAIL ── */
        .product-page {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 50px 24px 60px;
        }

        .product-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            overflow: hidden;
            max-width: 700px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
        }

        .product-image-wrap {
            flex: 0 0 280px;
            min-height: 300px;
            background: linear-gradient(135deg, #f0f4ff, #e8f0fe);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .product-image-wrap img {
            max-width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 12px;
        }

        .product-details {
            flex: 1;
            padding: 36px 30px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 220px;
        }

        .product-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2937;
            line-height: 1.3;
        }

        .product-price { font-size: 2rem; font-weight: 700; color: #7c3aed; }
        .product-price span { font-size: 1rem; color: #9ca3af; font-weight: 500; }

        .divider { height: 1px; background: #f3f4f6; }

        .desc-label {
            font-size: 11px;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        .product-desc {
            font-size: 14px;
            color: #4b5563;
            line-height: 1.7;
        }

        .no-product {
            color: white;
            text-align: center;
            padding: 100px 20px;
            font-size: 1.1rem;
            font-weight: 500;
            opacity: 0.85;
        }
    </style>
</head>
<body>

<div class="page-header">
    <a href="/product_store.html" class="back-btn">← Back to Store</a>
    <!-- User Widget -->
    <div class="user-widget" id="user-widget" onclick="toggleUserMenu()">
        <div class="uw-avatar" id="uw-avatar">?</div>
        <div class="uw-info">
            <span class="uw-name"    id="uw-name">Loading...</span>
            <span class="uw-balance" id="uw-balance">💰 0.00$</span>
        </div>
        <span class="uw-chevron">▾</span>
        <div class="uw-menu" id="uw-menu">
            <button onclick="event.stopPropagation(); openBalanceModal()">💵 Add Balance</button>
            <button class="logout-btn" onclick="event.stopPropagation(); doLogout()">↩ Logout</button>
        </div>
    </div>
</div>

<div class="product-page" id="product-page">
    <p class="no-product">Product not found.</p>
</div>

<!-- Balance Modal -->
<div id="balance-modal" class="balance-modal" style="display:none">
    <h3>💰 Add Balance</h3>
    <div class="quick-amounts">
        <button onclick="setQuickAmount(10)">+ 10$</button>
        <button onclick="setQuickAmount(50)">+ 50$</button>
        <button onclick="setQuickAmount(100)">+ 100$</button>
        <button onclick="setQuickAmount(500)">+ 500$</button>
    </div>
    <input type="number" id="balance-amount" placeholder="Custom amount ($)..." min="1">
    <div class="modal-btns">
        <button class="btn-confirm" onclick="submitBalance()">Add Balance</button>
        <button class="btn-cancel"  onclick="closeBalanceModal()">Cancel</button>
    </div>
</div>
<div id="balance-overlay" class="balance-overlay" style="display:none" onclick="closeBalanceModal()"></div>

<script src="auth.js"></script>
<script>
    const product = JSON.parse(localStorage.getItem('infoprod'));
    const page    = document.getElementById('product-page');

    if (product) {
        page.innerHTML = `
            <div class="product-card">
                <div class="product-image-wrap">
                    <img src="${product.image || ''}" alt="${product.name}">
                </div>
                <div class="product-details">
                    <h1 class="product-name">${product.name}</h1>
                    <p class="product-price">${product.price}<span> $</span></p>
                    <div class="divider"></div>
                    <p class="desc-label">Description</p>
                    <p class="product-desc">${product.info || 'No description provided for this product.'}</p>
                </div>
            </div>
        `;
    }

    initAuth();
</script>

</body>
</html>
