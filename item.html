<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product – Product Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            color: #1f2937;
        }

        /* ── HEADER ── */
        .page-header {
            display: flex;
            align-items: center;
            padding: 16px 30px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            text-decoration: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: translateY(-1px);
        }

        /* ── PRODUCT CARD ── */
        .product-page {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 50px 24px 60px;
        }

        .product-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            max-width: 700px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
        }

        /* Left: image */
        .product-image-wrap {
            flex: 0 0 280px;
            min-height: 320px;
            background: linear-gradient(135deg, #f0f4ff, #e8f0fe);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .product-image-wrap img {
            max-width: 100%;
            max-height: 260px;
            object-fit: contain;
            border-radius: 12px;
        }

        /* Right: details */
        .product-details {
            flex: 1;
            padding: 36px 30px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 220px;
        }

        .product-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2937;
            line-height: 1.3;
        }

        .product-price {
            font-size: 2rem;
            font-weight: 700;
            color: #7c3aed;
        }

        .product-price span {
            font-size: 1rem;
            color: #9ca3af;
            font-weight: 500;
        }

        .divider {
            height: 1px;
            background: #f3f4f6;
        }

        .product-desc-label {
            font-size: 12px;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .product-desc {
            font-size: 14px;
            color: #4b5563;
            line-height: 1.7;
        }

        .no-product {
            color: white;
            text-align: center;
            padding: 100px 20px;
            font-size: 1.2rem;
            font-weight: 500;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="page-header">
    <a href="product_store.html" class="back-btn">← Back to Store</a>
</div>

<div class="product-page" id="product-page">
    <p class="no-product">Product not found.</p>
</div>

<script>
    const product = JSON.parse(localStorage.getItem('infoprod'));
    const page = document.getElementById('product-page');

    if (product) {
        page.innerHTML = `
            <div class="product-card">
                <div class="product-image-wrap">
                    <img src="${product.image || ''}" alt="${product.name}">
                </div>
                <div class="product-details">
                    <h1 class="product-name">${product.name}</h1>
                    <p class="product-price">${product.price}<span> $</span></p>
                    <div class="divider"></div>
                    <p class="product-desc-label">Description</p>
                    <p class="product-desc">${product.info || 'No description provided for this product.'}</p>
                </div>
            </div>
        `;
    }
</script>

</body>
</html>
