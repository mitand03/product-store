<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart – Product Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            color: #1f2937;
        }

        /* ── HEADER ── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 30px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .page-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            letter-spacing: 2px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }

        .back-btn {
            text-decoration: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: translateY(-1px);
        }

        #clear-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 8px 18px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.35);
            transition: all 0.2s ease;
        }

        #clear-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.5);
        }

        /* ── MAIN CONTENT ── */
        .cart-wrapper {
            max-width: 960px;
            margin: 30px auto;
            padding: 0 24px 40px;
        }

        .empty-msg {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            font-weight: 500;
            padding: 80px 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            opacity: 0.85;
        }

        /* ── CART ITEMS ── */
        .items {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }

        .item {
            background: white;
            border-radius: 18px;
            padding: 0;
            width: 200px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .item:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.22);
        }

        .item-img {
            width: 100%;
            height: 140px;
            background: linear-gradient(135deg, #f0f4ff, #e8f0fe);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .item-img img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .item-info {
            padding: 12px 14px;
        }

        .item-info strong {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-info .price {
            font-size: 15px;
            font-weight: 700;
            color: #7c3aed;
        }

        /* ── TOTAL CARD ── */
        .total-card {
            background: white;
            border-radius: 20px;
            padding: 24px 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .total-label {
            font-size: 14px;
            color: #6b7280;
            font-weight: 500;
        }

        .total-amount {
            font-size: 2rem;
            font-weight: 700;
            color: #7c3aed;
        }

        .total-amount span { font-size: 1.1rem; color: #9ca3af; font-weight: 500; }
    </style>
</head>
<body>

<div class="page-header">
    <a href="product_store.html" class="back-btn">← Back to Store</a>
    <h2>🛒 Cart</h2>
    <button id="clear-btn">Clear Cart</button>
</div>

<div class="cart-wrapper">
    <div class="items" id="items"></div>
    <div class="total-card" id="total-card" style="display:none;">
        <div>
            <p class="total-label">Order Total</p>
            <p class="total-amount" id="total">0 <span>$</span></p>
        </div>
    </div>
</div>

<script>
    const itemsContainer = document.getElementById('items');
    const totalCard = document.getElementById('total-card');
    const totalEl = document.getElementById('total');
    let tempproducts = JSON.parse(localStorage.getItem('tempproducts')) || [];

    function renderCart() {
        itemsContainer.innerHTML = '';

        if (tempproducts.length === 0) {
            itemsContainer.innerHTML = '<p class="empty-msg">Your cart is empty.</p>';
            totalCard.style.display = 'none';
            return;
        }

        totalCard.style.display = 'flex';

        tempproducts.forEach(product => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <div class="item-img">
                    <img src="${product.image}" alt="${product.name}">
                </div>
                <div class="item-info">
                    <strong>${product.name}</strong>
                    <p class="price">${product.price}$</p>
                </div>
            `;
            itemsContainer.appendChild(div);
        });

        const total = tempproducts.reduce((sum, p) => sum + Number(p.price), 0);
        totalEl.innerHTML = `${total.toFixed(2)} <span>$</span>`;
    }

    document.getElementById('clear-btn').addEventListener('click', () => {
        localStorage.removeItem('tempproducts');
        tempproducts = [];
        renderCart();
    });

    renderCart();
</script>

</body>
</html>
