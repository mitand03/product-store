<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart – Product Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            color: #1f2937;
        }

        /* ── HEADER ── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 200;
            gap: 12px;
        }

        .back-btn {
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .back-btn:hover { background: rgba(255,255,255,0.35); transform: translateY(-1px); }

        .page-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            letter-spacing: 2px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }

        /* ── MAIN ── */
        .cart-wrapper {
            max-width: 980px;
            margin: 30px auto;
            padding: 0 24px 50px;
        }

        .empty-msg {
            text-align: center;
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
            padding: 80px 20px;
            opacity: 0.85;
        }

        /* ── CART ITEMS ── */
        .items {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 28px;
        }

        .item {
            background: white;
            border-radius: 18px;
            width: 195px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.14);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .item:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(0,0,0,0.22); }

        .item-img {
            width: 100%; height: 130px;
            background: linear-gradient(135deg, #f0f4ff, #e8f0fe);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .item-img img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .item-info { padding: 11px 13px; }

        .item-info strong {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-info .price { font-size: 14px; font-weight: 700; color: #7c3aed; }

        /* ── TOTAL CARD ── */
        .total-card {
            background: white;
            border-radius: 22px;
            padding: 28px 32px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.16);
        }

        .total-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
        }

        .total-label { font-size: 14px; color: #6b7280; font-weight: 500; }
        .total-amount { font-size: 2.2rem; font-weight: 700; color: #7c3aed; }
        .total-amount span { font-size: 1rem; color: #9ca3af; font-weight: 500; }

        .cart-actions { display: flex; gap: 12px; flex-wrap: wrap; }

        .btn-purchase {
            flex: 1;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 14px;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(102,126,234,0.4);
            transition: all 0.25s;
            letter-spacing: 0.3px;
        }

        .btn-purchase:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(102,126,234,0.55);
        }

        .btn-purchase:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear-cart {
            padding: 15px 22px;
            background: #f3f4f6;
            color: #374151;
            border: none;
            border-radius: 14px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-clear-cart:hover { background: #e5e7eb; }

        /* ── SUCCESS SCREEN ── */
        .success-screen {
            display: none;
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .success-screen .check { font-size: 4rem; margin-bottom: 16px; animation: bounceIn 0.5s ease; }
        .success-screen h2     { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
        .success-screen p      { font-size: 14px; opacity: 0.85; margin-bottom: 24px; }

        .btn-continue {
            display: inline-block;
            padding: 12px 30px;
            background: white;
            color: #7c3aed;
            border: none;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            transition: all 0.2s;
        }

        .btn-continue:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }

        @keyframes bounceIn {
            0%   { transform: scale(0); }
            60%  { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="page-header">
    <a href="/product_store.html" class="back-btn">← Back</a>
    <span class="page-title">🛒 Cart</span>

    <!-- User Widget -->
    <div class="user-widget" id="user-widget" onclick="toggleUserMenu()">
        <div class="uw-avatar" id="uw-avatar">?</div>
        <div class="uw-info">
            <span class="uw-name"    id="uw-name">Loading...</span>
            <span class="uw-balance" id="uw-balance">💰 0.00$</span>
        </div>
        <span class="uw-chevron">▾</span>
        <div class="uw-menu" id="uw-menu">
            <button onclick="event.stopPropagation(); openBalanceModal()">💵 Add Balance</button>
            <button class="logout-btn" onclick="event.stopPropagation(); doLogout()">↩ Logout</button>
        </div>
    </div>
</div>

<div class="cart-wrapper">
    <!-- Success screen (hidden by default) -->
    <div class="success-screen" id="success-screen">
        <div class="check">✅</div>
        <h2>Purchase Complete!</h2>
        <p id="success-msg">Your order has been placed successfully.</p>
        <a href="/product_store.html" class="btn-continue">Continue Shopping</a>
    </div>

    <!-- Cart content -->
    <div id="cart-content">
        <div class="items" id="items"></div>
        <div class="total-card" id="total-card" style="display:none">
            <div class="total-row">
                <div>
                    <p class="total-label">Order Total</p>
                    <p class="total-amount" id="total">0 <span>$</span></p>
                </div>
            </div>
            <div class="cart-actions">
                <button class="btn-purchase" id="purchase-btn" onclick="doPurchase()">💳 Purchase</button>
                <button class="btn-clear-cart" onclick="clearCart()">Clear Cart</button>
            </div>
        </div>
    </div>
</div>

<!-- Balance Modal -->
<div id="balance-modal" class="balance-modal" style="display:none">
    <h3>💰 Add Balance</h3>
    <div class="quick-amounts">
        <button onclick="setQuickAmount(10)">+ 10$</button>
        <button onclick="setQuickAmount(50)">+ 50$</button>
        <button onclick="setQuickAmount(100)">+ 100$</button>
        <button onclick="setQuickAmount(500)">+ 500$</button>
    </div>
    <input type="number" id="balance-amount" placeholder="Custom amount ($)..." min="1">
    <div class="modal-btns">
        <button class="btn-confirm" onclick="submitBalance()">Add Balance</button>
        <button class="btn-cancel"  onclick="closeBalanceModal()">Cancel</button>
    </div>
</div>
<div id="balance-overlay" class="balance-overlay" style="display:none" onclick="closeBalanceModal()"></div>

<script src="auth.js"></script>
<script>
    let tempproducts = JSON.parse(localStorage.getItem('tempproducts')) || [];

    function renderCart() {
        const itemsEl   = document.getElementById('items');
        const totalCard = document.getElementById('total-card');
        itemsEl.innerHTML = '';

        if (tempproducts.length === 0) {
            itemsEl.innerHTML = '<p class="empty-msg">Your cart is empty. Go add some products!</p>';
            totalCard.style.display = 'none';
            return;
        }

        totalCard.style.display = 'block';

        tempproducts.forEach(p => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <div class="item-img"><img src="${p.image}" alt="${p.name}"></div>
                <div class="item-info">
                    <strong>${p.name}</strong>
                    <p class="price">${p.price}$</p>
                </div>
            `;
            itemsEl.appendChild(div);
        });

        const total = tempproducts.reduce((s, p) => s + Number(p.price), 0);
        document.getElementById('total').innerHTML = `${total.toFixed(2)} <span>$</span>`;
    }

    async function doPurchase() {
        const total = tempproducts.reduce((s, p) => s + Number(p.price), 0);
        const btn   = document.getElementById('purchase-btn');
        btn.disabled    = true;
        btn.textContent = 'Processing...';

        const res  = await fetch('/api/purchase', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ total })
        });
        const data = await res.json();

        if (data.success) {
            // Update balance display
            refreshBalance(data.balance);

            // Clear cart
            localStorage.removeItem('tempproducts');
            tempproducts = [];

            // Show success screen
            const saved = total.toFixed(2);
            document.getElementById('success-msg').textContent =
                `You spent ${saved}$. New balance: ${parseFloat(data.balance).toFixed(2)}$`;
            document.getElementById('cart-content').style.display  = 'none';
            document.getElementById('success-screen').style.display = 'block';
        } else {
            showToast(data.error || 'Purchase failed', 'error');
            btn.disabled    = false;
            btn.textContent = '💳 Purchase';
        }
    }

    function clearCart() {
        localStorage.removeItem('tempproducts');
        tempproducts = [];
        renderCart();
    }

    initAuth().then(() => renderCart());
</script>

</body>
</html>
